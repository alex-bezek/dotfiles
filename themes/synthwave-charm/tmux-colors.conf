# ── Synthwave Charm colors ─────────────────────────────────────────────────────

# Status bar
set -g status-style "bg=#1a1333,fg=#f8f7ff"
set -g status-position bottom
set -g status-left-length 40
set -g status-right-length 60

set -g status-left "#[bg=#8b3dff,fg=#0e0a1f,bold] #S #[bg=#1a1333,fg=#8b3dff,nobold]  "
set -g status-right "#[fg=#322655]  #[bg=#322655,fg=#5a6bff] %d %b #[bg=#322655,fg=#f8f7ff,bold] %H:%M #[bg=#322655,fg=#0e0a1f] "

# Windows
set -g window-status-format         "#[fg=#5a6bff] #I  #W "
set -g window-status-current-format "#[bg=#322655,fg=#d59bff,bold] #I  #W #[bg=#1a1333,fg=#322655]"
set -g window-status-separator      ""

# Pane borders
set -g pane-border-style        "fg=#322655"
set -g pane-active-border-style "fg=#21e6ff"

# Messages / command line
set -g message-style        "bg=#322655,fg=#f8f7ff"
set -g message-command-style "bg=#322655,fg=#d59bff"

# Copy mode highlight
set -g mode-style "bg=#322655,fg=#f8f7ff"
