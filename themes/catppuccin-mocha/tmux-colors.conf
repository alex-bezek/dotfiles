# ── Catppuccin Mocha colors ────────────────────────────────────────────────────

# Status bar
set -g status-style "bg=#1e1e2e,fg=#cdd6f4"
set -g status-position bottom
set -g status-left-length 40
set -g status-right-length 60

set -g status-left "#[bg=#89b4fa,fg=#1e1e2e,bold] #S #[bg=#1e1e2e,fg=#89b4fa,nobold]  "
set -g status-right "#[fg=#45475a]  #[bg=#45475a,fg=#a6adc8] %d %b #[bg=#45475a,fg=#cdd6f4,bold] %H:%M #[bg=#45475a,fg=#1e1e2e] "

# Windows
set -g window-status-format         "#[fg=#6c7086] #I  #W "
set -g window-status-current-format "#[bg=#313244,fg=#89b4fa,bold] #I  #W #[bg=#1e1e2e,fg=#313244]"
set -g window-status-separator      ""

# Pane borders
set -g pane-border-style        "fg=#6c7086"
set -g pane-active-border-style "fg=#89b4fa"

# Messages / command line
set -g message-style        "bg=#313244,fg=#cdd6f4"
set -g message-command-style "bg=#313244,fg=#f9e2af"

# Copy mode highlight
set -g mode-style "bg=#313244,fg=#cdd6f4"
