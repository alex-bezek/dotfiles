name: CI
on:
  pull_request:
  push:
    branches: [master]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install tools
        run: |
          sudo apt-get install -y shellcheck
          which jq || sudo apt-get install -y jq
      - name: Lint
        run: bash scripts/ci/lint.sh
