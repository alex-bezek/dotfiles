# tmux config — theme managed by themes/switch-theme.sh

# True color support
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"

# ── Prefix: host-aware to avoid nested tmux conflicts ────────────────────────
# macOS local tmux uses Ctrl+Space — easy with Caps Lock mapped to Ctrl.
# Linux hosts (EC2, Codespaces, devcontainers) keep the default Ctrl+b.
if-shell '[ "$(uname -s)" = "Darwin" ]' {
  unbind C-b
  set -g prefix C-Space
  bind C-Space send-prefix
} {
  unbind C-Space
  set -g prefix C-b
  bind C-b send-prefix
}

# Quality of life
set -g mouse on
set -g history-limit 200000
set -g status-interval 5
set -sg escape-time 0
set -g focus-events on

# Start windows/panes at 1, renumber on close
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# Vi-style copy mode
setw -g mode-keys vi
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel

# Intuitive splits (preserve current path)
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# New window preserves path
bind c new-window -c "#{pane_current_path}"

# Reload config
bind r source-file ~/.config/tmux/tmux.conf \; display-message " config reloaded"

# sesh session picker — prefix + T
# Requires: brew install sesh fzf
bind T display-popup -E -w 80% -h 70% "sesh connect \$(sesh list --icons | fzf \
  --no-sort --ansi \
  --border-label ' sessions ' \
  --prompt '⚡  ' \
  --header 'ctrl-a: all  ctrl-t: tmux  ctrl-z: zoxide  ctrl-d: kill' \
  --bind 'ctrl-a:reload(sesh list --icons)' \
  --bind 'ctrl-t:reload(sesh list -t --icons)' \
  --bind 'ctrl-z:reload(sesh list -z --icons)' \
  --bind 'ctrl-d:execute(tmux kill-session -t \$(echo {} | awk \"{print \\\$NF}\"))+reload(sesh list --icons)' \
  | awk '{print \$NF}')"

# ── Theme colors (managed by themes/switch-theme.sh) ─────────────────────────
source-file -q ~/.config/tmux/theme.conf
