# Starship prompt — theme managed by themes/switch-theme.sh
# https://starship.rs/config/

"$schema" = 'https://starship.rs/config-schema.json'

# Prompt format: dir > git > lang > env > newline > char
format = """
$directory\
$git_branch\
$git_status\
$golang\
$kubernetes\
$env_var\
$cmd_duration\
$line_break\
$status\
$character"""

palette = "synthwave_charm"

[directory]
style = "bold blue"
truncation_length = 4
truncation_symbol = "…/"
read_only = " 󰌾"

[git_branch]
symbol = " "
style = "bold mauve"
format = "on [$symbol$branch(:$remote_branch)]($style) "

[git_status]
style = "bold red"
format = '([\[$all_status$ahead_behind\]]($style) )'
ahead = "⇡${count}"
behind = "⇣${count}"
diverged = "⇕⇡${ahead_count}⇣${behind_count}"
untracked = "?"
modified = "!"
staged = "+"
renamed = "»"
deleted = "✘"

[golang]
symbol = " "
style = "bold teal"
format = "[$symbol($version)]($style) "

[kubernetes]
disabled = false
style = "bold yellow"
symbol = "☸ "
format = "[$symbol$context( \\($namespace\\))]($style) "
# Only show when KUBECONFIG is set or when you're in a k8s-related dir
detect_files = ["k8s", "*.yaml", "kustomization.yaml", "Chart.yaml"]

[env_var.NGROK_ENV]
variable = "NGROK_ENV"
symbol = "🐸 "
style = "bold green"
format = "[$symbol$env_value]($style) "

[cmd_duration]
min_time = 500
style = "bold yellow"
format = "took [$duration]($style) "

[status]
disabled = false
symbol = "✗ "
style = "bold red"
format = "[$symbol$status]($style) "

[character]
success_symbol = "[❯](bold green)"
error_symbol = "[❯](bold red)"
vimcmd_symbol = "[❮](bold mauve)"

[line_break]
disabled = false

